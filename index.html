<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ronika TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0c10">
    <link rel="apple-touch-icon" href="./AppLogo.jpg">
    
    <style>
        :root {
            --bg-base: #0a0c10;
            --bg-ui: #161a20;
            --accent: #00bcd4;
            --accent-glow: rgba(0, 188, 212, 0.5);
            --text-main: #ffffff;
            --text-secondary: #9ba1a6;
            --border: #2d333b;
        }

        body {
            font-family: 'Vazirmatn', Tahoma, Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden; 
            touch-action: pan-y;
        }
        
        .header {
            flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;
            padding: 12px 25px; background: linear-gradient(-45deg, #0a0c10, #161a20, #004b57, #008194);
            background-size: 400% 400%; animation: gradientBG 12s ease infinite;
            border-bottom: 2px solid var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 1000;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .brand-container { display: flex; align-items: center; gap: 12px; }
        .app-logo-img { width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--accent); }
        .app-title { margin: 0; font-size: 22px; font-weight: 900; color: #fff; text-transform: uppercase; }

        .header-buttons { display: flex; gap: 10px; align-items: center; }

        .lang-btn {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 8px 15px; border-radius: 25px;
            font-size: 14px; font-weight: bold; font-family: inherit; cursor: pointer; transition: all 0.3s ease;
        }
        .lang-btn:hover { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        
        .install-btn { background: #e50914; border-color: #e50914; display: none; }
        .install-btn:hover { background: #b80710; box-shadow: 0 0 15px rgba(229, 9, 20, 0.5); }

        .main-content { display: flex; flex: 1; overflow: hidden; }

        .channel-sidebar {
            width: 320px; background-color: var(--bg-ui); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 20;
        }

        .search-container { padding: 10px; background: #111418; }
        .search-input {
            width: 100%; padding: 8px 12px; background: #1c2025; border: 1px solid var(--border);
            border-radius: 20px; color: #fff; font-family: inherit; outline: none; box-sizing: border-box;
        }
        .search-input:focus { border-color: var(--accent); }

        .category-tabs { display: flex; padding: 10px; gap: 5px; background: #111418; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .category-tabs::-webkit-scrollbar { height: 4px; }
        .category-tabs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .tab-btn {
            background: #1c2025; color: var(--text-secondary); border: 1px solid var(--border);
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; white-space: nowrap;
        }
        .tab-btn.active { background-color: var(--accent); color: #000; font-weight: bold; }

        .channel-list { padding: 10px; overflow-y: auto; flex: 1; }
        .channel-item {
            display: flex; align-items: center; gap: 12px; padding: 10px; margin-bottom: 8px;
            background-color: #1a1e24; border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: 0.3s;
        }
        .channel-item.active { background-color: #242930; border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        .channel-item.active .channel-name { color: var(--accent); }

        .channel-logo-wrapper {
            width: 40px; height: 40px; border-radius: 50%; background-color: #fff;
            display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0;
        }
        .channel-logo { width: 85%; height: 85%; object-fit: contain; }
        .channel-name { font-size: 14px; font-weight: 700; color: var(--text-secondary); flex: 1; }

        .fav-btn { background: none; border: none; color: #555; font-size: 20px; cursor: pointer; padding: 5px; transition: 0.3s; }
        .fav-btn.favorited { color: #ff4757; text-shadow: 0 0 10px rgba(255, 71, 87, 0.5); }

        .player-section { flex: 1; display: flex; flex-direction: column; background-color: #000; position: relative; min-width: 0;}
        
        .now-playing-bar {
            padding: 10px 20px; background: #0a0c10; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .playing-info { display: flex; align-items: center; gap: 10px; }
        .now-playing-label { color: var(--accent); font-size: 12px; font-weight: bold; }
        #current-channel-name { color: #fff; font-size: 18px; font-weight: 900; }

        .controls-right { display: flex; gap: 10px; align-items: center; }
        .icon-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 18px; }
        .icon-btn:hover { color: var(--accent); }
        
        .quality-selector {
            background: #1c2025; color: #fff; border: 1px solid var(--border); padding: 5px 10px;
            border-radius: 5px; font-family: inherit; outline: none; cursor: pointer; font-size: 12px;
        }

        #player-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 0; }
        video { width: 100%; height: 100%; object-fit: contain; outline: none; }
        
        .loader {
            display: none; position: absolute; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; z-index: 50;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #error-msg {
            display: none; position: absolute; background: rgba(0, 0, 0, 0.8); color: #ff4d4d;
            padding: 15px; border-radius: 8px; z-index: 100; text-align: center; border: 1px solid #ff4d4d;
        }

        .swipe-hint {
            display: none; position: absolute; bottom: 60px; color: rgba(255,255,255,0.5);
            font-size: 12px; z-index: 20; text-align: center; width: 100%; pointer-events: none;
        }

        @media (max-width: 768px) {
            body { overflow: auto; height: auto; }
            .main-content { flex-direction: column; }
            .channel-sidebar { width: 100%; height: auto; border-left: none; }
            .player-section { height: auto; }
            #player-container { aspect-ratio: 16/9; height: auto; }
            .swipe-hint { display: block; }
            .app-title { font-size: 20px; }
            .lang-btn { padding: 6px 12px; font-size: 12px;}
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-container">
            <img src="./AppLogo.jpg" alt="Ronika Logo" class="app-logo-img">
            <h2 class="app-title">Ronika TV</h2>
        </div>
        <div class="header-buttons">
            <button id="install-btn" class="lang-btn install-btn">📥 دابەزاندن</button>
            <button id="lang-btn" class="lang-btn" onclick="toggleLanguage()">English</button>
        </div>
    </div>

    <div class="main-content">
        <div class="player-section">
            <div class="now-playing-bar">
                <div class="playing-info">
                    <span class="now-playing-label" id="label-playing">خەریکی بینینی:</span>
                    <span id="current-channel-name">تکایە کەناڵێک هەڵبژێرە</span>
                </div>
                <div class="controls-right">
                    <button class="icon-btn" onclick="shareApp()" title="Share">🔗</button>
                    <select id="quality-selector" class="quality-selector" onchange="changeQuality(this.value)" style="display:none;">
                        <option value="-1">Auto</option>
                    </select>
                    <button class="icon-btn" onclick="toggleFullScreen()">🔳</button>
                </div>
            </div>
            <div id="player-container">
                <div id="loader" class="loader"></div>
                <video id="video" controls autoplay playsinline></video>
                <div id="error-msg"></div>
                <div class="swipe-hint" id="swipe-hint">👈 ڕابکێشە بۆ گۆڕینی کەناڵ 👉</div>
            </div>
        </div>

        <div class="channel-sidebar">
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="گەڕان بۆ کەناڵ..." oninput="searchChannels()">
            </div>
            <div class="category-tabs">
                <button class="tab-btn" id="tab-fav" onclick="filterChannels('fav')">⭐ دڵخوازەکان</button>
                <button class="tab-btn active" id="tab-all" onclick="filterChannels('all')">هەموو</button>
                <button class="tab-btn" id="tab-news" onclick="filterChannels('news')">هەواڵ</button>
                <button class="tab-btn" id="tab-ent" onclick="filterChannels('entertainment')">فیلم و دراما</button>
                <button class="tab-btn" id="tab-sports" onclick="filterChannels('sports')">وەرزشی</button>
            </div>
            <div id="channels-container" class="channel-list"></div>
        </div>
    </div>

    <script>
        // لیست کانال‌ها دوباره مستقیماً داخل کدهای اصلی قرار گرفتند
        const myChannels = [
            { id: "ch1", name: "Rudaw TV", category: "news", logo: "https://raw.githubusercontent.com/picons/picons/2c3e96a983996957dc8e6c33c60ebd65ce98f1e2/build-source/logos/rudaw.dark.svg", url: "https://live.rudaw.net/hls/rudaw-tv/master.m3u8" },
            { id: "ch2", name: "Kurdistan 24", category: "news", logo: "https://i.imgur.com/9QWs2ms.png", url: "https://ronikatv.salehjawhar.workers.dev/?url=https://d1x82nydcxndze.cloudfront.net/live/index_720p25.m3u8" },
            { id: "ch3", name: "Kurdistan TV", category: "news", logo: "https://i.imgur.com/mjQptpc.png", url: "https://5a3ed7a72ed4b.streamlock.net/live/SMIL:myStream.smil/playlist.m3u8" },
            { id: "ch4", name: "NRT HD", category: "news", logo: "https://i.imgur.com/4pNMVZB.png", url: "https://live20.bozztv.com/giatv/giatv-nrt/nrt/chunks.m3u8" },
            { id: "ch5", name: "Kurdsat News", category: "news", logo: "https://i.imgur.com/F3XRwkt.png", url: "https://hlspackager.akamaized.net/live/DB/KURDSAT_NEWS/HLS/KURDSAT_NEWS.m3u8" },
            { id: "ch10", name: "Ava News", category: "news", logo: "https://assets.ava.news/logo/ava-logo.svg", url: "https://ava1.site/upload/ava.m3u8" },
            { id: "ch6", name: "Waar TV", category: "entertainment", logo: "https://i.imgur.com/rK0y02d.png", url: "https://live.kwikmotion.com/waarmedialive/waarmedia.smil/waarmediapublish/waarmedia_source/chunks.m3u8" },
            { id: "ch7", name: "Kurdmax TV", category: "entertainment", logo: "https://i.imgur.com/5urcbM5.png", url: "https://stream.kurdmax.tv/app/kurdmax-sorani/llhls.m3u8" },
            { id: "ch8", name: "Kurdmax Music", category: "entertainment", logo: "https://i.imgur.com/otnIdEu.png", url: "https://6476e46b58f91.streamlock.net/music/MUSIC2402/playlist.m3u8" },
            { id: "ch9", name: "NRT Sport", category: "sports", logo: "https://via.placeholder.com/50x50/ffffff/000000?text=NRT", url: "https://live20.bozztv.com/giatv/giatv-NRT-SPORT/NRT-SPORT/chunks.m3u8" }
        ];

        let favorites = JSON.parse(localStorage.getItem('ronika_favs')) || [];
        let activeUrl = "";
        let currentCategory = "all";
        let currentFilteredList = myChannels; 

        const container = document.getElementById('channels-container');
        const channelTitle = document.getElementById('current-channel-name');
        const loader = document.getElementById('loader');
        const qualitySelector = document.getElementById('quality-selector');
        const video = document.getElementById('video');
        let hls;

        function renderChannels(list) {
            currentFilteredList = list;
            container.innerHTML = '';
            if(list.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#555;">هیچ کەناڵێک نییە</div>';
                return;
            }
            list.forEach(ch => {
                const isFav = favorites.includes(ch.id);
                const div = document.createElement('div');
                div.className = `channel-item ${ch.url === activeUrl ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="channel-logo-wrapper"><img class="channel-logo" src="${ch.logo}" onerror="this.src='https://via.placeholder.com/40'"></div>
                    <div class="channel-name">${ch.name}</div>
                    <button class="fav-btn ${isFav ? 'favorited' : ''}" onclick="toggleFav(event, '${ch.id}')">${isFav ? '❤️' : '🤍'}</button>
                `;
                div.onclick = () => playChannel(ch);
                container.appendChild(div);
            });
        }

        function toggleFav(e, id) {
            e.stopPropagation();
            favorites.includes(id) ? favorites = favorites.filter(i => i !== id) : favorites.push(id);
            localStorage.setItem('ronika_favs', JSON.stringify(favorites));
            filterChannels(currentCategory);
        }

        function filterChannels(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + (cat === 'entertainment' ? 'ent' : cat)).classList.add('active');
            let filtered = cat === 'all' ? myChannels : (cat === 'fav' ? myChannels.filter(c => favorites.includes(c.id)) : myChannels.filter(c => c.category === cat));
            // اگر متنی جستجو شده بود، آن را هم در فیلتر لحاظ کند
            let term = document.getElementById('search-input').value.toLowerCase();
            if(term) {
                filtered = filtered.filter(c => c.name.toLowerCase().includes(term));
            }
            renderChannels(filtered);
        }

        function searchChannels() { filterChannels(currentCategory); }

        video.addEventListener('waiting', () => loader.style.display = 'block');
        video.addEventListener('playing', () => loader.style.display = 'none');

        function playChannel(ch) {
            activeUrl = ch.url;
            channelTitle.innerText = ch.name;
            renderChannels(currentFilteredList); // فقط آپدیت ظاهر
            
            loader.style.display = 'block';
            qualitySelector.style.display = 'none';
            document.getElementById('error-msg').style.display = 'none';

            if (hls) hls.destroy();
            video.pause();

            if (Hls.isSupported()) {
                hls = new Hls({ maxBufferLength: 10, liveSyncDurationCount: 3 });
                hls.loadSource(ch.url);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, (e, data) => {
                    video.play();
                    if(data.levels.length > 1) {
                        qualitySelector.innerHTML = '<option value="-1">Auto</option>';
                        data.levels.forEach((level, index) => {
                            qualitySelector.innerHTML += `<option value="${index}">${level.height}p</option>`;
                        });
                        qualitySelector.style.display = 'block';
                    }
                });

                hls.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                document.getElementById('error-msg').style.display = 'block';
                                document.getElementById('error-msg').innerText = "پەخشەکە پچڕا. تکایە دووبارە هەوڵبدەرەوە.";
                                loader.style.display = 'none';
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = ch.url;
                video.play();
            }
            if(window.innerWidth > 768) window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function changeQuality(val) { if(hls) hls.currentLevel = parseInt(val); }

        function toggleFullScreen() {
            if (!document.fullscreenElement) video.requestFullscreen();
            else document.exitFullscreen();
        }

        function shareApp() {
            if (navigator.share) navigator.share({ title: 'Ronika TV', url: window.location.href });
            else alert("Link copied: " + window.location.href);
        }

        // سیستم سوایپ (کشیدن انگشت)
        let touchstartX = 0; let touchendX = 0;
        const playerArea = document.getElementById('player-container');
        playerArea.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX );
        playerArea.addEventListener('touchend', e => { touchendX = e.changedTouches[0].screenX; handleSwipe(); });

        function handleSwipe() {
            if(currentFilteredList.length === 0 || !activeUrl) return;
            const idx = currentFilteredList.findIndex(ch => ch.url === activeUrl);
            if (touchendX < touchstartX - 50) playChannel(currentFilteredList[idx + 1] || currentFilteredList[0]);
            if (touchendX > touchstartX + 50) playChannel(currentFilteredList[idx - 1] || currentFilteredList[currentFilteredList.length - 1]);
        }

        const uiText = {
            ku: { label: "خەریکی بینینی:", noSelect: "تکایە کەناڵێک هەڵبژێرە", all: "هەموو", news: "هەواڵ", ent: "فیلم", sports: "وەرزش", fav: "⭐ دڵخواز", hint: "👈 ڕابکێشە بۆ گۆڕینی کەناڵ 👉", install: "📥 دابەزاندن", search: "گەڕان بۆ کەناڵ..." },
            en: { label: "Now Playing:", noSelect: "Please select a channel", all: "All", news: "News", ent: "Movies", sports: "Sports", fav: "⭐ Favorites", hint: "👈 Swipe to change channel 👉", install: "📥 Install App", search: "Search channels..." }
        };

        let currentLang = 'ku';
        function toggleLanguage() {
            currentLang = currentLang === 'ku' ? 'en' : 'ku';
            const t = uiText[currentLang];
            document.documentElement.dir = currentLang === 'ku' ? 'rtl' : 'ltr';
            document.getElementById('label-playing').innerText = t.label;
            if(activeUrl === "") channelTitle.innerText = t.noSelect;
            document.getElementById('tab-all').innerText = t.all;
            document.getElementById('tab-news').innerText = t.news;
            document.getElementById('tab-ent').innerText = t.ent;
            document.getElementById('tab-sports').innerText = t.sports;
            document.getElementById('tab-fav').innerText = t.fav;
            document.getElementById('swipe-hint').innerText = t.hint;
            document.getElementById('install-btn').innerText = t.install;
            document.getElementById('search-input').placeholder = t.search;
            document.getElementById('lang-btn').innerText = currentLang === 'ku' ? 'English' : 'کوردی';
        }

        filterChannels('all');

        // پاپ‌آپ نصب
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt !== null) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
        }
    </script>
</body>
</html>
