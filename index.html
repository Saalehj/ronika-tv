<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ronika TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0c10">
    <link rel="apple-touch-icon" href="https://i.imgur.com/b3hX9Lw.jpg">
    
    <style>
        :root {
            --bg-base: #0a0c10;
            --bg-ui: #161a20;
            --accent: #00bcd4;
            --accent-glow: rgba(0, 188, 212, 0.5);
            --text-main: #ffffff;
            --text-secondary: #9ba1a6;
            --border: #2d333b;
        }

        body {
            font-family: 'Vazirmatn', Tahoma, Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0; padding: 0;
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; 
        }
        
        .header {
            flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;
            padding: 12px 25px; background: linear-gradient(-45deg, #0a0c10, #161a20, #004b57, #008194);
            background-size: 400% 400%; animation: gradientBG 12s ease infinite;
            border-bottom: 2px solid var(--accent); box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 1000;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .brand-container { display: flex; align-items: center; gap: 12px; }
        .app-logo-img { width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--accent); }
        .app-title { margin: 0; font-size: 22px; font-weight: 900; color: #fff; text-transform: uppercase; }

        .main-content { display: flex; flex: 1; overflow: hidden; }

        .channel-sidebar {
            width: 320px; background-color: var(--bg-ui); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 20;
        }

        /* استایل نوار جستجو */
        .search-container { padding: 10px; background: #111418; }
        .search-input {
            width: 100%; padding: 8px 12px; background: #1c2025; border: 1px solid var(--border);
            border-radius: 20px; color: #fff; font-family: inherit; outline: none; box-sizing: border-box;
        }
        .search-input:focus { border-color: var(--accent); }

        .category-tabs { display: flex; padding: 10px; gap: 5px; background: #111418; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab-btn {
            background: #1c2025; color: var(--text-secondary); border: 1px solid var(--border);
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; white-space: nowrap;
        }
        .tab-btn.active { background-color: var(--accent); color: #000; font-weight: bold; }

        .channel-list { padding: 10px; overflow-y: auto; flex: 1; }
        .channel-item {
            display: flex; align-items: center; gap: 12px; padding: 10px; margin-bottom: 8px;
            background-color: #1a1e24; border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: 0.3s;
        }
        .channel-item.active { background-color: #242930; border-color: var(--accent); }

        .channel-logo-wrapper {
            width: 40px; height: 40px; border-radius: 50%; background-color: #fff;
            display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0;
        }
        .channel-logo { width: 85%; height: 85%; object-fit: contain; }
        .channel-name { font-size: 14px; font-weight: 700; color: var(--text-secondary); flex: 1; }

        .player-section { flex: 1; display: flex; flex-direction: column; background-color: #000; position: relative; }
        .now-playing-bar {
            padding: 10px 20px; background: #0a0c10; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        #current-channel-name { color: #fff; font-size: 18px; font-weight: 900; }

        .controls-right { display: flex; gap: 10px; align-items: center; }
        .icon-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 18px; }
        .icon-btn:hover { color: var(--accent); }

        #player-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .loader {
            display: none; position: absolute; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            body { overflow: auto; height: auto; }
            .main-content { flex-direction: column; }
            .channel-sidebar { width: 100%; height: auto; }
            #player-container { aspect-ratio: 16/9; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-container">
            <img src="https://i.imgur.com/b3hX9Lw.jpg" alt="Ronika Logo" class="app-logo-img">
            <h2 class="app-title">Ronika TV</h2>
        </div>
        <button id="lang-btn" class="lang-btn" onclick="toggleLanguage()">English</button>
    </div>

    <div class="main-content">
        <div class="channel-sidebar">
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="گەڕان بۆ کەناڵ..." oninput="searchChannels()">
            </div>
            <div class="category-tabs">
                <button class="tab-btn active" id="tab-all" onclick="filterChannels('all')">هەموو</button>
                <button class="tab-btn" id="tab-fav" onclick="filterChannels('fav')">⭐ دڵخواز</button>
                <button class="tab-btn" id="tab-news" onclick="filterChannels('news')">هەواڵ</button>
                <button class="tab-btn" id="tab-ent" onclick="filterChannels('entertainment')">فیلم</button>
                <button class="tab-btn" id="tab-sports" onclick="filterChannels('sports')">وەرزش</button>
            </div>
            <div id="channels-container" class="channel-list"></div>
        </div>

        <div class="player-section">
            <div class="now-playing-bar">
                <span id="current-channel-name">Ronika TV</span>
                <div class="controls-right">
                    <button class="icon-btn" onclick="shareApp()" title="Share">🔗</button>
                    <select id="quality-selector" style="display:none; background:#1c2025; color:#fff; border:1px solid #333; border-radius:5px; font-size:12px; padding:2px 5px;"></select>
                    <button class="icon-btn" onclick="toggleFullScreen()">🔳</button>
                </div>
            </div>
            <div id="player-container">
                <div id="loader" class="loader"></div>
                <video id="video" controls autoplay playsinline></video>
            </div>
        </div>
    </div>

    <script>
        const myChannels = [
            { id: 1, name: "Rudaw TV", category: "news", logo: "https://i.imgur.com/Zo3IWOn.png", url: "https://live.rudaw.net/hls/rudaw-tv/master.m3u8" },
            { id: 2, name: "Kurdistan 24", category: "news", logo: "https://i.imgur.com/9QWs2ms.png", url: "https://ronikatv.salehjawhar.workers.dev/?url=https://d1x82nydcxndze.cloudfront.net/live/index_720p25.m3u8" },
            { id: 3, name: "Kurdistan TV", category: "news", logo: "https://i.imgur.com/mjQptpc.png", url: "https://5a3ed7a72ed4b.streamlock.net/live/SMIL:myStream.smil/playlist.m3u8" },
            { id: 4, name: "NRT HD", category: "news", logo: "https://i.imgur.com/4pNMVZB.png", url: "https://live20.bozztv.com/giatv/giatv-nrt/nrt/chunks.m3u8" },
            { id: 5, name: "Kurdsat News", category: "news", logo: "https://i.imgur.com/F3XRwkt.png", url: "https://hlspackager.akamaized.net/live/DB/KURDSAT_NEWS/HLS/KURDSAT_NEWS.m3u8" },
            { id: 6, name: "Waar TV", category: "entertainment", logo: "https://i.imgur.com/rK0y02d.png", url: "https://live.kwikmotion.com/waarmedialive/waarmedia.smil/waarmediapublish/waarmedia_source/chunks.m3u8" },
            { id: 7, name: "Kurdmax TV", category: "entertainment", logo: "https://i.imgur.com/5urcbM5.png", url: "https://stream.kurdmax.tv/app/kurdmax-sorani/llhls.m3u8" },
            { id: 8, name: "Kurdmax Music", category: "entertainment", logo: "https://i.imgur.com/otnIdEu.png", url: "https://6476e46b58f91.streamlock.net/music/MUSIC2402/playlist.m3u8" },
            { id: 9, name: "NRT Sport", category: "sports", logo: "https://via.placeholder.com/50x50/ffffff/000000?text=NRT", url: "https://live20.bozztv.com/giatv/giatv-NRT-SPORT/NRT-SPORT/chunks.m3u8" }
        ];

        let favorites = JSON.parse(localStorage.getItem('ronika_favs')) || [];
        let activeUrl = "";
        let currentCategory = "all";
        const container = document.getElementById('channels-container');
        const video = document.getElementById('video');
        const loader = document.getElementById('loader');
        let hls;

        function renderChannels(list) {
            container.innerHTML = '';
            list.forEach(ch => {
                const isFav = favorites.includes(ch.id);
                const div = document.createElement('div');
                div.className = `channel-item ${ch.url === activeUrl ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="channel-logo-wrapper"><img class="channel-logo" src="${ch.logo}"></div>
                    <div class="channel-name">${ch.name}</div>
                    <span onclick="toggleFav(event, ${ch.id})">${isFav ? '❤️' : '🤍'}</span>
                `;
                div.onclick = () => playChannel(ch);
                container.appendChild(div);
            });
        }

        function toggleFav(e, id) {
            e.stopPropagation();
            favorites.includes(id) ? favorites = favorites.filter(i => i !== id) : favorites.push(id);
            localStorage.setItem('ronika_favs', JSON.stringify(favorites));
            filterChannels(currentCategory);
        }

        function filterChannels(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + (cat === 'entertainment' ? 'ent' : cat)).classList.add('active');
            let filtered = cat === 'all' ? myChannels : (cat === 'fav' ? myChannels.filter(c => favorites.includes(c.id)) : myChannels.filter(c => c.category === cat));
            renderChannels(filtered);
        }

        function searchChannels() {
            let term = document.getElementById('search-input').value.toLowerCase();
            renderChannels(myChannels.filter(c => c.name.toLowerCase().includes(term)));
        }

        function playChannel(ch) {
            activeUrl = ch.url;
            document.getElementById('current-channel-name').innerText = ch.name;
            renderChannels(myChannels.filter(c => currentCategory === 'all' || c.category === currentCategory));
            
            loader.style.display = 'block';
            if (hls) hls.destroy();
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(ch.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); loader.style.display = 'none'; });
            } else {
                video.src = ch.url;
                video.play();
            }
        }

        function shareApp() {
            if (navigator.share) {
                navigator.share({ title: 'Ronika TV', text: 'Watch Kurdish Channels Live!', url: window.location.href });
            } else { alert("Link copied: " + window.location.href); }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) video.requestFullscreen();
            else document.exitFullscreen();
        }

        let currentLang = 'ku';
        function toggleLanguage() {
            currentLang = currentLang === 'ku' ? 'en' : 'ku';
            document.documentElement.dir = currentLang === 'ku' ? 'rtl' : 'ltr';
            document.getElementById('search-input').placeholder = currentLang === 'ku' ? 'گەڕان بۆ کەناڵ...' : 'Search channels...';
            document.getElementById('lang-btn').innerText = currentLang === 'ku' ? 'English' : 'کوردی';
        }

        filterChannels('all');

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Ready"));
        }
    </script>
</body>
</html>
