<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ronika TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#060913">
    <link rel="apple-touch-icon" href="./AppLogo.jpg">
    
    <style>
        :root {
            --bg-base: #060913;
            --bg-glass: rgba(20, 25, 40, 0.6);
            --accent-1: #00bcd4;
            --accent-2: #8a2be2;
            --text-main: #ffffff;
            --text-muted: #8b95a5;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at 10% 20%, rgba(138, 43, 226, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(0, 188, 212, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
            touch-action: pan-y;
        }

        /* هدر شیشه‌ای و مدرن */
        .header {
            flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; 
            background: rgba(10, 14, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .brand-container { display: flex; align-items: center; gap: 15px; }
        .app-logo-img { width: 45px; height: 45px; border-radius: 12px; border: 2px solid var(--accent-1); box-shadow: 0 0 15px rgba(0, 188, 212, 0.3); }
        .app-title { margin: 0; font-size: 22px; font-weight: 900; background: linear-gradient(to right, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .header-buttons { display: flex; gap: 10px; align-items: center; }
        .modern-btn {
            background: var(--bg-glass); border: 1px solid var(--border); color: #fff;
            padding: 8px 16px; border-radius: 20px; font-weight: bold; font-family: inherit;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px);
        }
        .modern-btn:hover { background: var(--accent-2); border-color: var(--accent-2); box-shadow: 0 0 15px rgba(138, 43, 226, 0.4); }
        .install-btn { background: #ff2a5f; border-color: #ff2a5f; display: none; }
        .install-btn:hover { background: #e0003b; box-shadow: 0 0 15px rgba(255, 42, 95, 0.5); }

        .main-content { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* سایدبار شیشه‌ای */
        .channel-sidebar {
            width: 340px; background: var(--bg-glass); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 20; backdrop-filter: blur(10px);
        }

        .search-container { padding: 15px; border-bottom: 1px solid var(--border); }
        .search-input {
            width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 12px; color: #fff; font-family: inherit; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent-1); box-shadow: 0 0 10px rgba(0, 188, 212, 0.2); }

        .category-tabs { display: flex; padding: 10px 15px; gap: 8px; overflow-x: auto; border-bottom: 1px solid var(--border); }
        .category-tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            background: rgba(0,0,0,0.4); color: var(--text-muted); border: 1px solid transparent;
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 13px; white-space: nowrap; transition: 0.3s;
        }
        .tab-btn.active { background: linear-gradient(45deg, var(--accent-1), var(--accent-2)); color: #fff; font-weight: bold; }

        .channel-list { padding: 15px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .channel-list::-webkit-scrollbar { width: 5px; }
        .channel-list::-webkit-scrollbar-thumb { background: var(--accent-2); border-radius: 10px; }
        
        .channel-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 15px;
            background: rgba(255,255,255,0.03); border-radius: 12px; cursor: pointer; border: 1px solid var(--border); transition: 0.3s;
        }
        .channel-item:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }
        .channel-item.active { background: rgba(0, 188, 212, 0.1); border-color: var(--accent-1); box-shadow: inset 0 0 20px rgba(0, 188, 212, 0.1); }
        
        .channel-logo-wrapper {
            width: 45px; height: 45px; border-radius: 50%; background: #fff; padding: 2px;
            display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .channel-logo { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
        .channel-name { font-size: 15px; font-weight: 700; color: #fff; flex: 1; }
        .fav-btn { background: none; border: none; font-size: 20px; cursor: pointer; transition: 0.3s; opacity: 0.5; filter: grayscale(100%); }
        .fav-btn.favorited { opacity: 1; filter: none; text-shadow: 0 0 15px rgba(255, 0, 0, 0.6); }

        /* بخش پلیر (چسبنده در موبایل) */
        .player-section { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; z-index: 50; }
        
        .now-playing-bar {
            padding: 12px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0.7)); 
            border-bottom: 1px solid var(--accent-1); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .playing-info { display: flex; flex-direction: column; }
        .now-playing-label { color: var(--accent-1); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        #current-channel-name { color: #fff; font-size: 18px; font-weight: 900; }

        .controls-right { display: flex; gap: 12px; align-items: center; }
        .icon-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; border-radius: 8px; padding: 8px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { background: var(--accent-1); color: #000; }
        
        .quality-selector { background: rgba(0,0,0,0.5); color: #fff; border: 1px solid var(--accent-1); padding: 5px 10px; border-radius: 8px; font-family: inherit; cursor: pointer; }

        /* کانتینر اصلی ویدیو و فول‌اسکرین */
        #video-wrapper {
            flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden;
        }
        video { width: 100%; height: 100%; object-fit: contain; outline: none; }
        
        .loader {
            display: none; position: absolute; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent-1);
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; z-index: 10;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========================================= */
        /* رابط کاربری (UI) اختصاصی حالت فول‌اسکرین */
        /* ========================================= */
        .fs-ui {
            position: absolute; left: 0; right: 0; padding: 20px; z-index: 2147483647; 
            transition: opacity 0.4s ease; opacity: 0; pointer-events: none;
        }
        .fs-ui.active { opacity: 1; pointer-events: auto; }
        
        /* هدر فول‌اسکرین */
        .fs-header {
            top: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .fs-title-box { background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); padding: 10px 20px; border-radius: 12px; border: 1px solid var(--accent-1); }
        .fs-title { font-size: 24px; font-weight: 900; color: #fff; margin: 0; }
        .fs-close { background: rgba(255,0,0,0.7); border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* لیست کانال‌ها در پایین فول‌اسکرین */
        .fs-footer {
            bottom: 0; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding-bottom: 30px;
        }
        .fs-channels {
            display: flex; gap: 15px; overflow-x: auto; padding: 10px; scroll-behavior: smooth;
        }
        .fs-channels::-webkit-scrollbar { display: none; }
        .fs-channel-card {
            min-width: 100px; background: rgba(20, 25, 40, 0.8); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: 0.3s;
        }
        .fs-channel-card:hover, .fs-channel-card.active { border-color: var(--accent-1); background: rgba(0, 188, 212, 0.2); transform: translateY(-5px); }
        .fs-card-logo { width: 50px; height: 50px; border-radius: 50%; background: #fff; padding: 2px; }
        .fs-card-name { color: #fff; font-size: 12px; font-weight: bold; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        @media (max-width: 768px) {
            body { overflow-y: auto; display: block; }
            .main-content { display: block; }
            /* جادوی پلیر چسبنده در موبایل */
            .player-section { 
                position: sticky; top: 0; z-index: 100; height: auto; 
                box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            }
            #video-wrapper { aspect-ratio: 16/9; height: auto; }
            .channel-sidebar { width: 100%; height: auto; border-left: none; }
            .channel-list { overflow: visible; padding-bottom: 50px; }
            .app-title { font-size: 18px; }
            .fs-title { font-size: 18px; }
            .fs-channel-card { min-width: 80px; padding: 8px; }
            .fs-card-logo { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-container">
            <img src="./AppLogo.jpg" alt="Ronika Logo" class="app-logo-img">
            <h2 class="app-title">Ronika TV</h2>
        </div>
        <div class="header-buttons">
            <button id="install-btn" class="modern-btn install-btn">📥 دابەزاندن</button>
            <button id="lang-btn" class="modern-btn" onclick="toggleLanguage()">EN</button>
        </div>
    </div>

    <div class="main-content">
        <div class="player-section">
            <div class="now-playing-bar">
                <div class="playing-info">
                    <span class="now-playing-label" id="label-playing">خەریکی بینینی</span>
                    <span id="current-channel-name">تکایە کەناڵێک هەڵبژێرە</span>
                </div>
                <div class="controls-right">
                    <select id="quality-selector" class="quality-selector" onchange="changeQuality(this.value)" style="display:none;">
                        <option value="-1">Auto</option>
                    </select>
                    <button class="icon-btn" onclick="toggleCustomFullscreen()" title="Full Screen">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </button>
                </div>
            </div>
            
            <div id="video-wrapper">
                <div id="loader" class="loader"></div>
                <video id="video" playsinline></video>
                <div id="click-overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; cursor:pointer;"></div>
                
                <div id="fs-header" class="fs-ui fs-header">
                    <div class="fs-title-box">
                        <p class="now-playing-label" style="margin:0">🔴 Live</p>
                        <h3 id="fs-channel-title" class="fs-title">Ronika TV</h3>
                    </div>
                    <button class="fs-close" onclick="document.exitFullscreen()">X</button>
                </div>
                
                <div id="fs-footer" class="fs-ui fs-footer">
                    <div class="fs-channels" id="fs-channels-container">
                        </div>
                </div>
            </div>
        </div>

        <div class="channel-sidebar">
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="🔍 گەڕان بۆ کەناڵ..." oninput="searchChannels()">
            </div>
            <div class="category-tabs">
                <button class="tab-btn" id="tab-fav" onclick="filterChannels('fav')">⭐ دڵخواز</button>
                <button class="tab-btn active" id="tab-all" onclick="filterChannels('all')">🌐 هەموو</button>
                <button class="tab-btn" id="tab-news" onclick="filterChannels('news')">📰 هەواڵ</button>
                <button class="tab-btn" id="tab-ent" onclick="filterChannels('entertainment')">🎬 فیلم</button>
                <button class="tab-btn" id="tab-sports" onclick="filterChannels('sports')">⚽ وەرزش</button>
            </div>
            <div id="channels-container" class="channel-list"></div>
        </div>
    </div>

    <script>
        // دیتابیس کانال‌ها
        const myChannels = [
            { id: "ch1", name: "Rudaw TV", category: "news", logo: "https://raw.githubusercontent.com/picons/picons/2c3e96a983996957dc8e6c33c60ebd65ce98f1e2/build-source/logos/rudaw.dark.svg", url: "https://live.rudaw.net/hls/rudaw-tv/master.m3u8" },
            { id: "ch10", name: "Ava News", category: "news", logo: "https://ava.news/ava-logo.svg", url: "https://ronikatv.salehjawhar.workers.dev/?url=http://ur4k.me:80/live/houmid738/1a1dbbe35/392585.m3u8" },
            { id: "ch2", name: "Kurdistan 24", category: "news", logo: "https://i.imgur.com/9QWs2ms.png", url: "https://ronikatv.salehjawhar.workers.dev/?url=https://d1x82nydcxndze.cloudfront.net/live/index_720p25.m3u8" },
            { id: "ch4", name: "NRT HD", category: "news", logo: "https://i.imgur.com/4pNMVZB.png", url: "https://live20.bozztv.com/giatv/giatv-nrt/nrt/chunks.m3u8" },
            { id: "ch5", name: "Kurdsat News", category: "news", logo: "https://i.imgur.com/F3XRwkt.png", url: "https://hlspackager.akamaized.net/live/DB/KURDSAT_NEWS/HLS/KURDSAT_NEWS.m3u8" },
            { id: "ch6", name: "Waar TV", category: "entertainment", logo: "https://i.imgur.com/rK0y02d.png", url: "https://live.kwikmotion.com/waarmedialive/waarmedia.smil/waarmediapublish/waarmedia_source/chunks.m3u8" },
            { id: "ch7", name: "Kurdmax TV", category: "entertainment", logo: "https://i.imgur.com/5urcbM5.png", url: "https://stream.kurdmax.tv/app/kurdmax-sorani/llhls.m3u8" },
            { id: "ch9", name: "Iran International", category: "news", logo: "https://raw.githubusercontent.com/picons/picons/2c3e96a983996957dc8e6c33c60ebd65ce98f1e2/build-source/logos/iraninternational.default.svg", url: "https://dev-live.livetvstream.co.uk/LS-63503-4/chunklist_b1196000.m3u8" },
            { id: "ch11", name: "IRIB TV3", category: "sports", logo: "https://raw.githubusercontent.com/picons/picons/refs/heads/master/build-source/logos/iribtv3.default.svg", url: "https://ca-rt.onetv.app:8443/IRIBChannel3/index-0.m3u8?token=onetv202" },
            { id: "ch12", name: "IRIB Varzesh", category: "sports", logo: "https://upload.wikimedia.org/wikipedia/fa/thumb/c/ca/IRIB_Varzesh_Logo.svg/512px-IRIB_Varzesh_Logo.svg.png", url: "https://ronikatv.salehjawhar.workers.dev/?url=http://cdn1.live.irib.ir:1935/channel-live/smil:varzesh/playlist.m3u8" }
        ];

        let favorites = JSON.parse(localStorage.getItem('ronika_favs')) || [];
        let activeUrl = "";
        let currentCategory = "all";
        let currentFilteredList = myChannels; 

        const container = document.getElementById('channels-container');
        const fsChannelsContainer = document.getElementById('fs-channels-container');
        const channelTitle = document.getElementById('current-channel-name');
        const fsChannelTitle = document.getElementById('fs-channel-title');
        const loader = document.getElementById('loader');
        const qualitySelector = document.getElementById('quality-selector');
        const video = document.getElementById('video');
        let hls;

        // رندر کانال‌ها در سایدبار اصلی
        function renderChannels(list) {
            currentFilteredList = list;
            container.innerHTML = ''; 
            
            if(list.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#8b95a5;">هیچ کەناڵێک نییە</div>';
                return;
            }

            list.forEach(channel => {
                const isFav = favorites.includes(channel.id);
                const div = document.createElement('div');
                div.className = `channel-item ${channel.url === activeUrl ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="channel-logo-wrapper"><img class="channel-logo" src="${channel.logo}"></div>
                    <div class="channel-name">${channel.name}</div>
                    <button class="fav-btn ${isFav ? 'favorited' : ''}" onclick="toggleFav(event, '${channel.id}')">❤️</button>
                `;
                div.onclick = () => playChannel(channel);
                container.appendChild(div);
            });
            renderFullscreenChannels(); // آپدیت منوی فول اسکرین
        }

        // رندر کانال‌ها در منوی فول‌اسکرین
        function renderFullscreenChannels() {
            fsChannelsContainer.innerHTML = '';
            currentFilteredList.forEach(channel => {
                const div = document.createElement('div');
                div.className = `fs-channel-card ${channel.url === activeUrl ? 'active' : ''}`;
                div.innerHTML = `
                    <img class="fs-card-logo" src="${channel.logo}">
                    <span class="fs-card-name">${channel.name}</span>
                `;
                div.onclick = (e) => {
                    e.stopPropagation(); // جلوگیری از بسته شدن منو
                    playChannel(channel);
                };
                fsChannelsContainer.appendChild(div);
            });
        }

        function toggleFav(e, id) {
            e.stopPropagation();
            favorites.includes(id) ? favorites = favorites.filter(i => i !== id) : favorites.push(id);
            localStorage.setItem('ronika_favs', JSON.stringify(favorites));
            filterChannels(currentCategory);
        }

        function filterChannels(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + (cat === 'entertainment' ? 'ent' : cat)).classList.add('active');
            let filtered = cat === 'all' ? myChannels : (cat === 'fav' ? myChannels.filter(c => favorites.includes(c.id)) : myChannels.filter(c => c.category === cat));
            let term = document.getElementById('search-input').value.toLowerCase();
            if(term) filtered = filtered.filter(c => c.name.toLowerCase().includes(term));
            renderChannels(filtered);
        }

        function searchChannels() { filterChannels(currentCategory); }

        video.addEventListener('waiting', () => loader.style.display = 'block');
        video.addEventListener('playing', () => loader.style.display = 'none');

        function playChannel(channel) {
            activeUrl = channel.url;
            channelTitle.innerText = channel.name; 
            fsChannelTitle.innerText = channel.name; // آپدیت تایتل فول اسکرین
            
            renderChannels(currentFilteredList); // رفرش لیست برای تغییر رنگ کانال فعال
            
            loader.style.display = 'block'; 
            qualitySelector.style.display = 'none';

            if (hls) hls.destroy(); 
            video.pause();

            if (Hls.isSupported()) {
                hls = new Hls({ maxBufferLength: 10, liveSyncDurationCount: 3 });
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, (e, data) => {
                    video.play();
                    // اضافه کردن دکمه‌های کنترل خود مرورگر بعد از لود شدن
                    video.setAttribute("controls", "controls");
                    if(data.levels.length > 1) {
                        qualitySelector.innerHTML = '<option value="-1">Auto</option>';
                        data.levels.forEach((level, index) => {
                            qualitySelector.innerHTML += `<option value="${index}">${level.height}p</option>`;
                        });
                        qualitySelector.style.display = 'block';
                    }
                });

                hls.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) {
                        if(data.type === Hls.ErrorTypes.NETWORK_ERROR) { hls.startLoad(); }
                        else { hls.destroy(); loader.style.display = 'none'; }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
                video.setAttribute("controls", "controls");
                video.play();
            }
        }

        function changeQuality(val) { if(hls) hls.currentLevel = parseInt(val); }

        /* ================================================= */
      /* سیستم جادویی فول‌اسکرین سفارشی با منوی کلیکی (اصلاح شده) */
/* ================================================= */
const videoWrapper = document.getElementById('video-wrapper');
const clickOverlay = document.getElementById('click-overlay'); // لایه جدید
const fsUiElements = document.querySelectorAll('.fs-ui');
let uiTimeout;

function toggleCustomFullscreen() {
    if (!document.fullscreenElement) {
        if (videoWrapper.requestFullscreen) videoWrapper.requestFullscreen();
        else if (videoWrapper.webkitRequestFullscreen) videoWrapper.webkitRequestFullscreen();
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
    }
}

// وقتی روی لایه نامرئی کلیک شد، منوی کانال‌ها را نشان بده
clickOverlay.addEventListener('click', (e) => {
    if(document.fullscreenElement) {
        showFullscreenUI();
        
        // مدیریت کنترل‌های مرورگر برای تداخل پیدا نکردن با منو
        if(video.hasAttribute("controls")) {
            video.removeAttribute("controls");
        } else {
            video.setAttribute("controls", "controls");
        }
    } else {
        // در حالت عادی، با کلیک روی تصویر ویدیو پخش یا متوقف شود
        if(video.paused) video.play(); else video.pause();
    }
});

function showFullscreenUI() {
    // نمایش المان‌ها
    fsUiElements.forEach(el => el.classList.add('active'));
    
    // ریست کردن تایمر مخفی شدن
    clearTimeout(uiTimeout);
    
    // بعد از 4 ثانیه عدم فعالیت، منو مخفی شود
    uiTimeout = setTimeout(() => {
        fsUiElements.forEach(el => el.classList.remove('active'));
    }, 4000);
}

// وقتی از حالت فول‌اسکرین خارج شد، منوها را کلاً مخفی کن
document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
        fsUiElements.forEach(el => el.classList.remove('active'));
